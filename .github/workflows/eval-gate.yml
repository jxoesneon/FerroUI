name: AI Safety Eval Gate (D.1)

on:
  push:
    branches: [main]
    paths:
      - 'ferroui/prompts/**'
      - 'packages/engine/**'
  pull_request:
    paths:
      - 'ferroui/prompts/**'
      - 'packages/engine/**'
  workflow_dispatch:

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-suite:
    name: Prompt Eval Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For attestation
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --if-present run build

      - name: Run Eval Suite (Default Suite v6)
        run: |
          pnpm -F @ferroui/engine exec tsx ferroui/evals/dataset.ts \
            --suite ferroui/evals/baselines/default_suite_v6.json \
            --output eval-results.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Check Pass Rate Threshold (D.1.1)
        run: |
          PASS_RATE=$(jq '.summary.pass_rate' eval-results.json)
          THRESHOLD=0.85
          if (( $(echo "$PASS_RATE < $THRESHOLD" | bc -l) )); then
            echo "❌ Eval pass rate $PASS_RATE below threshold $THRESHOLD"
            exit 1
          fi
          echo "✅ Eval pass rate $PASS_RATE meets threshold $THRESHOLD"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json

      - name: Attest eval results (D.1.4)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: eval-results.json
          subject-name: ferroui-eval-results

  red-team-scan:
    name: Red Team Corpus Scan (D.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run prompt injection detection
        run: |
          # Check for known injection patterns in prompts
          if grep -rE "(ignore.*previous|forget.*instruction|DAN|jailbreak)" \
             ferroui/prompts/v*/; then
            echo "⚠️ Potential prompt injection patterns detected"
            exit 1
          fi
          echo "✅ No prompt injection patterns detected"

  llm-judge:
    name: LLM-as-Judge Validation (D.3)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run LLM Judge on PR outputs
        run: |
          # Compare PR outputs against baseline using LLM judge
          echo "Running LLM judge validation..."
          # Implementation would call LLM to grade outputs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

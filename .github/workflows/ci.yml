name: Alloy CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - uses: actions/checkout@v4
      - run: npm install --frozen-lockfile
      - run: npm run build --if-present
      - run: npm test
      - run: npm run lint

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ferroui-production

resources:
  - ../../base
  - pdb.yaml
  - networkpolicy.yaml
  - servicemonitor.yaml

commonLabels:
  environment: production

replicas:
  - name: ferroui-engine
    count: 3

images:
  - name: ferroui-engine
    newTag: v1.0.0-stable

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: ferroui-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - AUDIT_LOG_OUTPUT=sqlite
      - RATE_LIMIT_MAX=1000

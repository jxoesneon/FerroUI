# Default values for ferroui-engine
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/ferroui/engine
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "4000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 4000
  targetPort: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ferroui.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - ferroui-engine
          topologyKey: kubernetes.io/hostname

# Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6379  # Redis

# Environment variables
env:
  # Required secrets (should be provided via external Secrets)
  JWT_SECRET:
    valueFrom:
      secretKeyRef:
        name: ferroui-secrets
        key: jwt-secret
  ANTHROPIC_API_KEY:
    valueFrom:
      secretKeyRef:
        name: ferroui-secrets
        key: anthropic-api-key
  
  # Config values
  NODE_ENV: production
  PORT: "4000"
  REDIS_URL:
    valueFrom:
      secretKeyRef:
        name: ferroui-redis
        key: url
  AUDIT_LOG_OUTPUT: file
  AUDIT_LOG_FILE: /var/log/ferroui/audit.log
  AUDIT_HMAC_SECRET:
    valueFrom:
      secretKeyRef:
        name: ferroui-secrets
        key: audit-hmac-secret

# Persistence for audit logs
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /var/log/ferroui

# Redis subchart
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: ferroui-redis
    existingSecretPasswordKey: password
  master:
    persistence:
      enabled: true
      size: 8Gi

# Grafana subchart
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin
    existingSecretPasswordKey: password
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus:9090
          access: proxy
          isDefault: true
  dashboardsConfigMaps:
    default: ferroui-dashboards
